  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ride-app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
#      kafka:
#        condition: service_started
    ports:
      - "8000:8000"
    environment:
      SUPERUSER: ${SUPERUSER}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD}

      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      DB_HOST: postgres
      DB_PORT: 5432

      REDIS_HOST: redis
      REDIS_PORT: 6379

#      KAFKA_BROKER: kafka:29092

      SERVICE_MODE: RUN
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
    volumes:
      - ./src:/app/src
    networks:
      - ride_network

volumes:
  postgres_data:

networks:
  ride_network:
    driver: bridge
