
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ride-postgres
    environment:
      POSTGRES_USER: ${SUPERUSER}
      POSTGRES_PASSWORD: ${SUPERUSER_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUPERUSER}"]
      interval: 15s
      timeout: 5m
      retries: 5
    networks:
      - ride_network

  redis:
    image: redis:7-alpine
    container_name: ride-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5m
      retries: 5
    networks:
      - ride_network

