
services:
  postgres:
    image: postgres:16-alpine
    container_name: ride-postgres
    environment:
      POSTGRES_USER: ${SUPERUSER}
      POSTGRES_PASSWORD: ${SUPERUSER_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUPERUSER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ride_network

  redis:
    image: redis:7-alpine
    container_name: ride-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ride_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ride-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ride_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ride-kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ride_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ride-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      SUPERUSER: ${SUPERUSER}
      SUPERUSER_PASSWORD: ${SUPERUSER_PASSWORD}

      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      DB_HOST: postgres
      DB_PORT: 5432

      REDIS_HOST: redis
      REDIS_PORT: 6379

      KAFKA_BROKER: kafka:29092

      SERVICE_MODE: RUN
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
    volumes:
      - ./src:/app/src
    networks:
      - ride_network

volumes:
  postgres_data:

networks:
  ride_network:
    driver: bridge
